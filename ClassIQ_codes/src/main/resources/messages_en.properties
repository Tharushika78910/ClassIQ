# HTML Content
html.privacy.title=Privacy Policy
html.effective.date=Effective Date
html.privacy.intro=This Privacy Policy describes how ClassIQ – Teacher's Gradebook and Report Card System collects, uses, and protects user information. ClassIQ is developed as an academic project for educational purposes.
html.privacy.section1.title=1. Information We Collect
html.privacy.section1.intro=ClassIQ may collect and store the following information:
html.privacy.section1.item1=Teacher account information (username and password)
html.privacy.section1.item2=Student details (student name, student ID, grades, assignments, exam marks)
html.privacy.section1.item3=Academic performance data used to calculate averages and final grades
html.privacy.section2.title=2. How We Use the Information
html.privacy.section2.content=The collected information is used solely for managing student grades, calculating weighted results, generating report cards, and providing secure login access for authorized users.
html.privacy.section3.title=3. Data Storage and Security
html.privacy.section3.content=All data is stored securely within the system. Access is restricted through role-based authentication. Basic security measures are implemented to prevent unauthorized access to academic records.
html.privacy.section4.title=4. Data Sharing
html.privacy.section4.content=ClassIQ does not sell, rent, or share personal information with third parties. The system is designed for educational use within a controlled academic environment.
html.privacy.section5.title=5. User Rights
html.privacy.section5.content=Teachers can manage and update student records within the system. Students can view their academic performance securely through their accounts.
html.privacy.section6.title=6. Cookies and Tracking
html.privacy.section6.content=ClassIQ is a desktop-based application and does not use cookies or online tracking technologies.
html.privacy.section7.title=7. Changes to This Policy
html.privacy.section7.content=This Privacy Policy may be updated as the project evolves. Updates will be reflected within the system documentation.
html.privacy.section8.title=8. Contact
html.privacy.section8.content=For questions regarding this Privacy Policy, please contact the project development team.
html.help.title=Help
html.help.intro=Find answers to common questions about using our platform.
html.help.login=To login, click the Login button and enter your credentials.
html.help.language=You can change the language using the dropdown menu.
html.help.support=For additional support, please contact your instructor.
html.help.page.title=ClassIQ Help
html.help.getting.started.title=Getting Started
html.help.getting.started.content=To use ClassIQ, start by logging in with your teacher or student account. Teachers can manage student grades and assignments, while students can view their grades and report cards.
html.help.features.title=Features
html.help.features.item1=Login/Logout functionality
html.help.features.item2=Student grade management
html.help.features.item3=Weighted grade calculations and report card generation
html.help.features.item4=Search functionality for students and assignments
html.help.features.item5=Automated system with data validation
html.help.navigation.title=Navigation Tips
html.help.navigation.content=Use the main buttons to access dashboards and features. Click on "Privacy Policy" in the footer to view privacy information.
html.help.support.title=Support
html.help.support.content=If you encounter any issues, contact the project development team via email or report issues in the system documentation.
