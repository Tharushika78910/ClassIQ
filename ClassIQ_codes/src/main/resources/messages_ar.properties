# HTML Content
html.privacy.title=سياسة الخصوصية
html.effective.date=التاريخ الفعلي
html.privacy.intro=تصف سياسة الخصوصية هذه كيف يجمع ClassIQ – دفتر علامات المعلم ونظام بطاقة التقارير ويستخدم ويحمي معلومات المستخدم. تم تطوير ClassIQ كمشروع أكاديمي لأغراض تعليمية.
html.privacy.section1.title=1. المعلومات التي نجمعها
html.privacy.section1.intro=قد يجمع ClassIQ ويخزن المعلومات التالية:
html.privacy.section1.item1=معلومات حساب المعلم (اسم المستخدم وكلمة المرور)
html.privacy.section1.item2=تفاصيل الطالب (اسم الطالب، معرف الطالب، الدرجات، المهام، علامات الامتحانات)
html.privacy.section1.item3=بيانات الأداء الأكاديمي المستخدمة لحساب المتوسطات والدرجات النهائية
html.privacy.section2.title=2. كيف نستخدم المعلومات
html.privacy.section2.content=يتم استخدام المعلومات التي تم جمعها فقط لإدارة درجات الطلاب، وحساب النتائج المرجحة، وإنشاء بطاقات التقارير، وتوفير وصول آمن لتسجيل الدخول للمستخدمين المصرح لهم.
html.privacy.section3.title=3. تخزين البيانات والأمان
html.privacy.section3.content=يتم تخزين جميع البيانات بشكل آمن داخل النظام. يتم تقييد الوصول من خلال المصادقة القائمة على الأدوار. يتم تطبيق تدابير أمنية أساسية لمنع الوصول غير المصرح به إلى السجلات الأكاديمية.
html.privacy.section4.title=4. مشاركة البيانات
html.privacy.section4.content=لا يقوم ClassIQ ببيع أو تأجير أو مشاركة المعلومات الشخصية مع أطراف ثالثة. تم تصميم النظام للاستخدام التعليمي ضمن بيئة أكاديمية خاضعة للرقابة.
html.privacy.section5.title=5. حقوق المستخدم
html.privacy.section5.content=يمكن للمعلمين إدارة سجلات الطلاب وتحديثها داخل النظام. يمكن للطلاب عرض أدائهم الأكاديمي بشكل آمن من خلال حساباتهم.
html.privacy.section6.title=6. ملفات تعريف الارتباط والتتبع
html.privacy.section6.content=ClassIQ هو تطبيق يعمل على سطح المكتب ولا يستخدم ملفات تعريف الارتباط أو تقنيات التتبع عبر الإنترنت.
html.privacy.section7.title=7. التغييرات على هذه السياسة
html.privacy.section7.content=قد يتم تحديث سياسة الخصوصية هذه مع تطوير المشروع. سيتم انعكاس التحديثات داخل وثائق النظام.
html.privacy.section8.title=8. التواصل
html.privacy.section8.content=للأسئلة المتعلقة بسياسة الخصوصية هذه، يرجى التواصل مع فريق تطوير المشروع.
html.help.title=مساعدة
html.help.intro=ابحث عن إجابات للأسئلة الشائعة حول استخدام منصتنا.
html.help.login=لتسجيل الدخول، انقر على زر تسجيل الدخول وأدخل بيانات الاعتماد الخاصة بك.
html.help.language=يمكنك تغيير اللغة باستخدام القائمة المنسدلة.
html.help.support=للحصول على دعم إضافي، يرجى التواصل مع مدرسك.
html.help.page.title=مساعدة ClassIQ
html.help.getting.started.title=البدء
html.help.getting.started.content=لاستخدام ClassIQ، ابدأ بتسجيل الدخول بحساب المعلم أو الطالب الخاص بك. يمكن للمعلمين إدارة درجات الطلاب والمهام، بينما يمكن للطلاب عرض درجاتهم وبطاقات التقارير.
html.help.features.title=الميزات
html.help.features.item1=وظيفة تسجيل الدخول/الخروج
html.help.features.item2=إدارة درجات الطلاب
html.help.features.item3=حسابات الدرجات المرجحة وتوليد بطاقات التقارير
html.help.features.item4=وظيفة البحث للطلاب والمهام
html.help.features.item5=نظام مؤتمت مع التحقق من صحة البيانات
html.help.navigation.title=نصائح التنقل
html.help.navigation.content=استخدم الأزرار الرئيسية للوصول إلى لوحات التحكم والميزات. انقر على "سياسة الخصوصية" في الذيل لعرض معلومات الخصوصية.
html.help.support.title=الدعم
html.help.support.content=إذا واجهت أي مشاكل، تواصل مع فريق تطوير المشروع عبر البريد الإلكتروني أو أبلغ عن المشاكل في وثائق النظام.

