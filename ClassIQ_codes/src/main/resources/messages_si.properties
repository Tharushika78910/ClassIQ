student.myinfo.rulesTitle=අනුගමනය කළ යුතු නීති
student.myinfo.rulesText=1. වේලාවට පැමිණ නිරන්තරයෙන් සහභාගි වන්න.\n2. ගුරුවරුන්ට සහ පන්තියේ මිතුරන්ට ගෞරව කරන්න.\n3. ගුරුවරයාගේ අවසරය ඇතොත් පමණක් දුරකථන භාවිතා කරන්න.\n4. ගෙදර වැඩ වේලාවට ඉදිරිපත් කරන්න.
student.myinfo.clubsTitle=සංගම් සහ අතිරේක ක්‍රියාකාරකම්
student.myinfo.clubsText=• ක්‍රීඩා සංගමය\n• සංගීත සංගමය\n• කලා සංගමය\n• කේතනය සංගමය\n• විද්‍යා සංගමය
student.myinfo.campTitle=ග්‍රීෂ්ම ශිබිරය
student.myinfo.campText=• ජූලි (දිනයන් පසුව දැනුම් දෙනු ලැබේ)\n• එළිමහන් ක්‍රීඩා සහ ව්‍යායාම\n• ලියාපදිංචිය අවශ්‍යයි