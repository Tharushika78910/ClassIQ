# HTML Content
html.privacy.title=පෞද්ගලිකත්ව ප්‍රතිපත්තිය
html.effective.date=බලාත්මක දිනය
html.privacy.intro=මෙම පෞද්ගලිකත්ව ප්‍රතිපත්තිය ClassIQ – ගුරුවරයාගේ ශ්‍රේණිපොත සහ වාර්තා පත්‍ර පද්ධතිය තොරතුරු එකතු කරන්නේ, භාවිතා කරන්නේ සහ ආරක්ෂා කරන්නේ කෙසේද යන්න විස්තර කරයි. ClassIQ අධ්‍යාපනික අරමුණු සඳහා ශාස්ත්‍රීය ව්‍යාපෘතියක් ලෙස සංවර්ධනය කරන ලදී.
html.privacy.section1.title=1. අපි රැස් කරන තොරතුරු
html.privacy.section1.intro=ClassIQ පහත තොරතුරු රැස් කර ගබඩා කළ හැක:
html.privacy.section1.item1=ගුරු ගිණුම් තොරතුරු (පරිශීලක නාමය සහ මුරපදය)
html.privacy.section1.item2=සිසු විස්තර (සිසුන්ගේ නම, සිසු අනතුරු අංකය, ශ්‍රේණි, ප්‍රශ්න පත්‍ර, විභාග ලකුණු)
html.privacy.section1.item3=සාමාන්‍ය සහ අවසන් ශ්‍රේණි ගණනය කිරීමට භාවිතා කරන අධ්‍යාපන දක්ෂතා දත්ත
html.privacy.section2.title=2. අපි තොරතුරු භාවිතා කරන ආකාරය
html.privacy.section2.content=රැස් කරන ලද තොරතුරු සිසු ශ්‍රේණි කළමනාකරණය සඳහා පමණක් භාවිතා කරනු ලැබේ, බරයි වූ ප්‍රතිඵල ගණනය කිරීම, වාර්තා පත්‍ර උත්පාදනය කිරීම, සහ අධිකාරීන්ට ආරක්ෂිත පිවිසීමේ ප්‍රවේශය සැපයීම.
html.privacy.section3.title=3. දත්ත ගබඩා කිරීම සහ ආරක්ෂාව
html.privacy.section3.content=සියළුම දත්ත පද්ධතිය තුළ ආරක්ෂිතව ගබඩා කර ඇත. භූමිකාවල සත්‍යාපනය හරහා ප්‍රවේශය සීමා කර ඇත. අධ්‍යාපන වාර්තා වලට අවසර නොමැති ප්‍රවේශය වැළැක්වීම සඳහා මූලික ආරක්ෂණ පියවර ක්‍රියාත්මක කර ඇත.
html.privacy.section4.title=4. දත්ත බෙදා හැරීම
html.privacy.section4.content=ClassIQ පෞද්ගලික තොරතුරු විකුණන්නේ නැත, කුලියට දන්නේ නැත හෝ තෙවන පාර්ශව සමඟ බෙදා හරන්නේ නැත. පද්ධතිය පාලනය වන අධ්‍යාපන පරිසරය තුළ අධ්‍යාපන භාවිතය සඳහා සැලසුම් කර ඇත.
html.privacy.section5.title=5. පරිශීලක අයිතිවාසිකම්
html.privacy.section5.content=ගුරුවරුන්ට පද්ධතිය තුළ සිසු වාර්තා කළමනාකරණය කළ හැක. සිසුන්ට ඔවුන්ගේ ගිණුම් හරහා ඔවුන්ගේ අධ්‍යාපන දක්ෂතා ආරක්ෂිතව බලන්න.
html.privacy.section6.title=6. කුකීස් සහ ලුහුබැඳීම
html.privacy.section6.content=ClassIQ ඩෙස්ක්ටොප් මත පදනම් වූ යෙදුමකි සහ කුකීස් හෝ සෘජු ලුහුබැඳීමේ තාක්ෂණවලින් භාවිතා නොකරයි.
html.privacy.section7.title=7. මෙම ප්‍රතිපත්තියට වෙනස්කම්
html.privacy.section7.content=මෙම පෞද්ගලිකත්ව ප්‍රතිපත්තිය ව්‍යාපෘතිය දියුණු වත්ම යාවත්කාලීන කළ හැක. යාවත්කාලීන කිරීම් පද්ධතියේ ප්‍රලේඛනය තුළ පිළිබිඹු වනු ඇත.
html.privacy.section8.title=8. සම්බන්ධතා
html.privacy.section8.content=මෙම පෞද්ගලිකත්ව ප්‍රතිපත්තිය පිළිබඳ ප්‍රශ්න සඳහා, කරුණාකර ව්‍යාපෘති සංවර්ධන කණ්ඩායමට සම්බන්ධ වන්න.
html.help.title=උපකාර
html.help.intro=අපගේ වේදිකාව භාවිතා කිරීම පිළිබඳ පොදු ප්‍රශ්නවලට පිළිතුරු සොයන්න.
html.help.login=පිවිසීමට, පිවිසෙන්න බොත්තම ක්ලික් කර ඔබගේ අක්තපත්ර ඇතුළත් කරන්න.
html.help.language=ඔබට ඩ්‍රොප්ඩවුන් මෙනුව භාවිතා කරමින් භාෂාව වෙනස් කළ හැක.
html.help.support=අතිරේක සහාය සඳහා, කරුණාකර ඔබගේ උපදේශකයාට සම්බන්ධ වන්න.
html.help.page.title=ClassIQ උපකාර
html.help.getting.started.title=ආරම්භය
html.help.getting.started.content=ClassIQ භාවිතා කිරීමට, ඔබගේ ගුරු හෝ සිසු ගිණුමේ පිවිසීමෙන් ආරම්භ කරන්න. ගුරුවරුන්ට සිසු ශ්‍රේණි සහ ප්‍රශ්න පත්‍ර කළමනාකරණය කළ හැක, අතර සිසුන්ට ඔවුන්ගේ ශ්‍රේණි සහ වාර්තා පත්‍ර බැලීමට හැක.
html.help.features.title=විශේෂාංග
html.help.features.item1=පිවිසීම/පිටවීම කාර්යය
html.help.features.item2=සිසු ශ්‍රේණි කළමනාකරණය
html.help.features.item3=බරයි වූ ශ්‍රේණි ගණනය සහ වාර්තා පත්‍ර උත්පාදනය
html.help.features.item4=සිසුන් සහ ප්‍රශ්න පත්‍ර සඳහා සෙවීමේ කාර්යය
html.help.features.item5=දත්ත වලංගු කිරීම සහිත ස්වයංක්‍රිය පද්ධතිය
html.help.navigation.title=සංචාලන ඉඟි
html.help.navigation.content=ඩැෂ්බෝඩ් සහ විශේෂාංග වෙත ප්‍රවේශ කිරීමට ප්‍රධාන බොත්තම භාවිතා කරන්න. පෞද්ගලිකත්ව තොරතුරු බැලීමට පාදයෙහි "පෞද්ගලිකත්ව ප්‍රතිපත්තිය" ක්ලික් කරන්න.
html.help.support.title=සහාය
html.help.support.content=ඔබට කිසියම ගැටළු ඇති වුවහොත්, ව්‍යාපෘති සංවර්ධන කණ්ඩායමට විද්යුත් තැපැලෙන් සම්බන්ධ වන්න හෝ පද්ධතියේ ප්‍රලේඛනයේ ගැටළු වාර්තා කරන්න.

